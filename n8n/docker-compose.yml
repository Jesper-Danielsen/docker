version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678" # Expose n8n web UI
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true         # Enable basic auth
      - N8N_BASIC_AUTH_USER=admin          # Change this username
      - N8N_BASIC_AUTH_PASSWORD=balder4000 # Change this password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - NODE_ENV=production
    # SQLite is default, so no DB_* variables needed
    volumes:
      - n8n_data:/home/node/.n8n  # Persistent data storage
      
volumes: 
    n8n_data: